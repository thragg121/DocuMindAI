[tool.black]
line-length = 88
target-version = ["py310"]
include = '\.pyi?$'
exclude = '''
/(
    \.git
  | \.mypy_cache
  | \.pytest_cache
  | \.ruff_cache
  | \.venv
  | venv
  | build
  | dist
  | data
  | uploads
  | chroma_data
)/
'''


[tool.isort]
profile = "black"
line_length = 88
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
skip = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "build",
    "dist",
    "data",
    "uploads",
    "chroma_data",
]


[tool.ruff]
line-length = 88
target-version = "py310"
exclude = [
    ".git",
    ".mypy_cache",
    ".pytest_cache",
    ".ruff_cache",
    ".venv",
    "venv",
    "build",
    "dist",
    "data",
    "uploads",
    "chroma_data",
]


[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
]
ignore = [
    "B008",
]


[tool.ruff.lint.isort]
combine-as-imports = true
force-wrap-aliases = true


[tool.mypy]
files = [
    "app",
]
exclude = [
    "^\\.venv/",
    "^venv/",
    "^build/",
    "^dist/",
    "^data/",
    "^uploads/",
    "^chroma_data/",
]
check_untyped_defs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
no_implicit_optional = true
show_error_codes = true
show_column_numbers = true
pretty = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unused_configs = true
warn_unreachable = true
strict_equality = true


[[tool.mypy.overrides]]
module = [
    "chromadb",
    "chromadb.*",
    "sentence_transformers",
    "sentence_transformers.*",
    "docx",
    "docx.*",
    "fitz",
    "fitz.*",
]
ignore_missing_imports = true


[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
]